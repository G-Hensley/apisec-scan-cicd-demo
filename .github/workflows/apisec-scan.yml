name: APIsec API Security Scan

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    # Allows manual trigger from the Actions tab — useful for customer demos
    # and for re-scanning after APIsec configuration changes without a code push.

jobs:
  apisec-scan:
    name: APIsec CI/CD Integration
    runs-on: ubuntu-latest

    steps:
      - name: Run APIsec CI/CD Security Scan
        run: |
          docker run --rm \
            -e INPUT_APPLICATION_ID="${{ secrets.APISEC_APPLICATION_ID }}" \
            -e INPUT_INSTANCE_ID="${{ secrets.APISEC_INSTANCE_ID }}" \
            -e INPUT_ACCESS_TOKEN="${{ secrets.APISEC_ACCESS_TOKEN }}" \
            -e INPUT_FAIL_ON_SEVERITY_THRESHOLD="${{ vars.APISEC_SEVERITY_THRESHOLD || '8' }}" \
            -e INPUT_FAIL_ON_ERROR_THRESHOLD="${{ vars.APISEC_ERROR_THRESHOLD || '0' }}" \
            -e INPUT_PRINT_SUMMARY=true \
            -e INPUT_PRINT_FULL=true \
            apisec/cicd:latest

# ──────────────────────────────────────────────────────────────────────────────
# Secrets  (Settings → Secrets and variables → Actions → New repository secret)
#
#   APISEC_APPLICATION_ID — UUID from the APIsec dashboard URL:
#                           /application/<APP_ID>/instance/...
#   APISEC_INSTANCE_ID    — UUID from the APIsec dashboard URL:
#                           /application/.../instance/<INSTANCE_ID>
#   APISEC_ACCESS_TOKEN   — Token from APIsec → API Token menu
#
# Variables  (Settings → Secrets and variables → Actions → New repository variable)
#
#   APISEC_SEVERITY_THRESHOLD — Min CVSS score that counts toward failure (default: 8)
#                               8 = fail on High (7.0-8.9) and Critical (9.0-10.0)
#   APISEC_ERROR_THRESHOLD    — Max qualifying findings allowed before failure (default: 0)
#                               0 = zero-tolerance; any qualifying finding fails the build
#
# To enforce this as a required status check before merging:
#   Settings → Branches → Branch protection rules → Require status checks
#   Add: "APIsec CI/CD Integration"
# ──────────────────────────────────────────────────────────────────────────────
