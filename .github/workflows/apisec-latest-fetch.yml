name: APIsec Latest Scan Gate

on:
  push:
    branches:
      - main
      - release/**
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  apisec-latest-fetch:
    name: APIsec Latest Scan Gate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build cicd-latest-fetch image (local)
        run: docker build -t apisec-cicd-latest-fetch:local cicd-latest-fetch/

      - name: Run APIsec Latest Scan Gate
        run: |
          docker run --rm \
            -e INPUT_APPLICATION_ID="${{ secrets.APISEC_APPLICATION_ID }}" \
            -e INPUT_INSTANCE_ID="${{ secrets.APISEC_INSTANCE_ID }}" \
            -e INPUT_ACCESS_TOKEN="${{ secrets.APISEC_ACCESS_TOKEN }}" \
            -e INPUT_FAIL_ON_SEVERITY_THRESHOLD="${{ vars.APISEC_SEVERITY_THRESHOLD || '8' }}" \
            -e INPUT_FAIL_ON_ERROR_THRESHOLD="${{ vars.APISEC_ERROR_THRESHOLD || '0' }}" \
            -e INPUT_PRINT_SUMMARY=true \
            apisec-cicd-latest-fetch:local
