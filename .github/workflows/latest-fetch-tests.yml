name: Latest-fetch image tests

on:
  push:
    branches: [main]
    paths:
      - 'cicd-latest-fetch/**'
      - '.github/workflows/latest-fetch-tests.yml'
  pull_request:
    paths:
      - 'cicd-latest-fetch/**'
      - '.github/workflows/latest-fetch-tests.yml'
  workflow_dispatch:

jobs:
  unit:
    name: Unit (in-container)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build latest-fetch image
        run: docker build -t apisec-cicd-latest-fetch:test cicd-latest-fetch/

      - name: Run robustness suite
        run: |
          docker run --rm \
            -v "$PWD/cicd-latest-fetch/tests:/test:ro" \
            --workdir /apisec \
            --entrypoint sh \
            apisec-cicd-latest-fetch:test -c 'python3 /test/test_robustness.py'
